<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART MAHALLA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #0088cc; text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .footer-text { text-align: center; font-size: 12px; color: #999; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>SMART MAHALLA</h2>
    <div class="input-group">
        <label>Nima sotiladi?</label>
        <input type="text" id="name" placeholder="Masalan: Press somon">
    </div>
    <div class="input-group">
        <label>Narxi (so'mda)</label>
        <input type="number" id="price" placeholder="Narxni kiriting">
    </div>
    <div class="input-group">
        <label>Batafsil ma'lumot</label>
        <textarea id="desc" rows="4" placeholder="Holati, manzili..."></textarea>
    </div>
    <button class="btn" onclick="yuborish()">KEYINGI QADAM ➔</button>
</div>

<div class="footer-text">Ilova asoschisi: Abdujamilov Yo'ldosh</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function yuborish() {
        const data = {
            item_name: document.getElementById('name').value,
            price: document.getElementById('price').value,
            desc: document.getElementById('desc').value
        };

        if(!data.item_name || !data.price) {
            alert("Iltimos, nomi va narxini to'ldiring!");
            return;
        }

        tg.sendData(JSON.stringify(data));
        tg.close();
    }
</script>
</body>
</html>
