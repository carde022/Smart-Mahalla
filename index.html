<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART MAHALLA PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #008080; } /* Yashil-moviy (Teal) rang */
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: var(--main-color); margin: 0; font-size: 24px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #444; font-size: 14px; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; 
            box-sizing: border-box; font-size: 16px; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--main-color); outline: none; }
        
        .btn { 
            background: var(--main-color); color: white; border: none; padding: 16px; 
            width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,128,128,0.3);
        }
        .footer-logo { text-align: center; font-size: 11px; color: #aaa; margin-top: 20px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>SMART MAHALLA</h2>
        <p style="font-size: 12px; color: #777;">E'loningizni to'g'ri bo'limga joylang</p>
    </div>

    <div class="input-group">
        <label>Bo'limni tanlang</label>
        <select id="category" onchange="updatePlaceholders()">
            <option value="🚗 Mashina">🚗 Mashina</option>
            <option value="🐄 Mol-hol">🐄 Mol-hol</option>
            <option value="🐑 Qo'y-qo'zi">🐑 Qo'y-qo'zi</option>
            <option value="🧱 Xomashyo">🧱 Xomashyo</option>
            <option value="🌾 Yem-hashak">🌾 Yem-hashak</option>
            <option value="🏠 Uy-joy">🏠 Uy-joy</option>
            <option value="📱 Boshqa">📱 Boshqa</option>
        </select>
    </div>

    <div class="input-group">
        <label id="label_name">Mahsulot nomi</label>
        <input type="text" id="name" placeholder="Masalan: Chevrolet Cobalt">
    </div>

    <div class="input-group">
        <label>Narxi (so'm)</label>
        <input type="number" id="price" placeholder="Sotilish narxini yozing">
    </div>

    <div class="input-group">
        <label>Telefon raqamingiz</label>
        <input type="tel" id="phone" value="+998" placeholder="+998 90 123 45 67">
    </div>

    <div class="input-group">
        <label>Manzil (Mahalla/Ko'cha)</label>
        <input type="text" id="address" placeholder="Masalan: Jarqo'rg'on tumani">
    </div>

    <div class="input-group">
        <label>Qo'shimcha tavsif</label>
        <textarea id="desc" rows="3" placeholder="Yili, holati haqida..."></textarea>
    </div>

    <button class="btn" onclick="sendData()">KAYINGI QADAM (RASM) ➔</button>
</div>

<div class="footer-logo">ASOSCHI: ABDUJAMILOV YOLDOSH</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Bo'limga qarab placeholderlarni o'zgartiruvchi funksiya
    function updatePlaceholders() {
        const cat = document.getElementById('category').value;
        const nameInput = document.getElementById('name');
        const descInput = document.getElementById('desc');

        if (cat.includes("Mashina")) {
            nameInput.placeholder = "Masalan: Chevrolet Cobalt";
            descInput.placeholder = "Yili: 2023, rangi: oq, yurgani: 10,000 km...";
        } else if (cat.includes("Mol-hol")) {
            nameInput.placeholder = "Masalan: Golshtin zotli sigir";
            descInput.placeholder = "Suti: kuniga 20 litr, nechinchi bolasi...";
        } else if (cat.includes("Qo'y-qo'zi")) {
            nameInput.placeholder = "Masalan: Hisori qo'chqor";
            descInput.placeholder = "Yoshi: 2 yosh, vazni: 80 kg atrofida...";
        } else if (cat.includes("Xomashyo")) {
            nameInput.placeholder = "Masalan: Pishgan g'isht";
            descInput.placeholder = "Soni: 5000 dona, yetkazib berish ichida...";
        } else if (cat.includes("Yem-hashak")) {
            nameInput.placeholder = "Masalan: Bug'doy press";
            descInput.placeholder = "Soni: 200 ta press, Jarqo'rg'onda...";
        } else if (cat.includes("Uy-joy")) {
            nameInput.placeholder = "Masalan: 4 xonali hovli";
            descInput.placeholder = "Maydoni: 6 sotix, gaz, suv, svet bor...";
        } else {
            nameInput.placeholder = "Nima sotmoqchisiz?";
            descInput.placeholder = "Batafsil ma'lumot yozing...";
        }
    }

    function sendData() {
        const data = {
            category: document.getElementById('category').value,
            item_name: document.getElementById('name').value,
            price: document.getElementById('price').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
            desc: document.getElementById('desc').value
        };

        if(!data.item_name || !data.price || data.phone === "+998") {
            alert("Iltimos, barcha muhim joylarni to'ldiring!");
            return;
        }

        tg.sendData(JSON.stringify(data));
        tg.close();
    }
    
    // Sahifa yuklanganda placeholderlarni birinchi marta to'g'irlash
    updatePlaceholders();
</script>
</body>
</html>
