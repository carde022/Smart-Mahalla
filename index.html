<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART MAHALLA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; padding: 0; }
        .tabs { display: flex; background: #0088cc; color: white; }
        .tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: bold; }
        .tab.active { background: #006699; border-bottom: 3px solid white; }
        .container { padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; display: none; }
        .card.active { display: block; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #0088cc; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; margin-top: 10px; }
        .elon-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .elon-item b { color: #0088cc; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" onclick="showTab('view')">👁 E'lonlar</div>
    <div class="tab" onclick="showTab('add')">➕ E'lon berish</div>
</div>

<div class="container">
    <div id="tab-view" class="card active">
        <h3>Mahalla e'lonlari</h3>
        <div id="elonlar-ro'yxati">
            <p>Hozircha e'lonlar yo'q. Birinchi bo'lib e'lon bering!</p>
        </div>
    </div>

    <div id="tab-add" class="card">
        <h3>Yangi e'lon</h3>
        <div class="input-group">
            <label>Mahsulot nomi</label>
            <input type="text" id="item_name" placeholder="Masalan: Press somon">
        </div>
        <div class="input-group">
            <label>Narxi</label>
            <input type="number" id="price" placeholder="Narxni kiriting">
        </div>
        <div class="input-group">
            <label>Rasm havolasi (ixtiyoriy)</label>
            <input type="text" id="photo_url" placeholder="Rasm manzili (link)">
        </div>
        <div class="input-group">
            <label>Tavsif</label>
            <textarea id="desc" rows="3" placeholder="Batafsil ma'lumot..."></textarea>
        </div>
        <button class="btn" onclick="yuborish()">Guruhga yuborish</button>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function showTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        
        if(tab === 'view') {
            document.querySelector('.tab:nth-child(1)').classList.add('active');
            document.getElementById('tab-view').classList.add('active');
        } else {
            document.querySelector('.tab:nth-child(2)').classList.add('active');
            document.getElementById('tab-add').classList.add('active');
        }
    }

    function yuborish() {
        let name = document.getElementById('item_name').value;
        let price = document.getElementById('price').value;
        let photo = document.getElementById('photo_url').value;
        let desc = document.getElementById('desc').value;

        if(!name || !price) {
            alert("Nom va narxni kiriting!");
            return;
        }

        let data = {
            item_name: name,
            price: price,
            photo: photo,
            desc: desc
        };

        tg.sendData(JSON.stringify(data));
    }
</script>
</body>
</html>
